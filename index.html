<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="./style/style.css" />
    </head>
    <body>
        <header class="header">
            <div class="container">
                <nav class="header-nav">
                    <ul class="header-nav-list">
                        <li>
                            <a class="header-nav-item" href="#">Aviation fly</a>
                        </li>
                        <li>
                            <a class="header-nav-item" href="#aboutus"
                                >About us</a
                            >
                        </li>
                    </ul>
                </nav>
            </div>
        </header>
        <main class="main">
            <section class="hero-section">
                <div class="container">
                    <div class="hero-section-container">
                        <img
                            class="hero-image"
                            src="./images/hero-iamge-plane.png"
                            alt=""
                        />
                        <h1 class="hero-title">Aviation Fly</h1>
                    </div>
                </div>
            </section>
            <section class="main-section">
                <div class="container">
                    <div class="main-section-container">
                        <div class="title-section">
                            <h2 class="main-title">Paste PNR from Amadeus :</h2>
                        </div>
                        <div class="work-section">
                            <textarea
                                name=""
                                id=""
                                cols="30"
                                rows="10"
                            ></textarea>
                            <button id="btn-chk" class="button-check"></button>
                            <button id="btn-rst" class="button-reset"></button>
                            <button id="btn-cp" class="button-copy"></button>
                        </div>
                    </div>
                </div>
            </section>
            <section id="aboutus" class="about-section">
                <div class="container">
                    <div class="about-section-container"></div>
                </div>
            </section>
        </main>
        <footer class="footer">
            <div class="container">
                <nav class="footer-nav">
                    <ul class="footer-nav-item">
                        <li class="footer-nav-list">
                            <a href="">Aviation fly</a>
                        </li>
                        <li class="footer-nav-list"><a href="">About us</a></li>
                    </ul>
                </nav>
            </div>
        </footer>
    </body>
</html>
